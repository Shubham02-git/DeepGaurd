# EfficientNetB4 detector trained on DFD (DeepFakeDetection) dataset
# Dataset: DFD_manipulated_sequences (fake) + DFD_original_sequences (real)

# log dir
log_dir: ./logs/training

# model setting
pretrained: null
model_name: efficientnetb4
backbone_name: efficientnetb4

# backbone setting
backbone_config:
  num_classes: 2
  inc: 3
  dropout: false
  mode: Original

# dataset — must match the key in preprocessing/dataset_json/DFD.json
all_dataset: [DFD]
train_dataset: [DFD]
test_dataset: [DFD]

compression: c23
train_batchSize: 32
test_batchSize: 32
workers: 4
frame_num:
  train: 8
  test: 8
resolution: 256
with_mask: false
with_landmark: false
save_ckpt: true
save_feat: false

# data augmentation
use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.1
  rotate_limit: [-10, 10]
  blur_prob: 0.3
  blur_limit: [3, 5]
  brightness_prob: 0.3
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

# mean and std for normalization
mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]

# optimizer
optimizer:
  type: adam
  adam:
    lr: 0.0002
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false
  sgd:
    lr: 0.0002
    momentum: 0.9
    weight_decay: 0.0005

lr_scheduler: null
nEpochs: 10
start_epoch: 2
save_epoch: 1
resume: ./logs/training/efficientnetb4_2026-03-01-17-42-51/test/avg/ckpt_best.pth
rec_iter: 100
manualSeed: 1024

# loss function
loss_func: cross_entropy
losstype: null

# metric
metric_scoring: auc
