# log dir 
log_dir: ./logs/training

# model setting
pretrained: null
model_name: efficientnetb4
backbone_name: efficientnetb4

# backbone setting
backbone_config:
  num_classes: 2
  inc: 3
  dropout: false
  mode: Original

# dataset
all_dataset: [Celeb-DF-v2]
train_dataset: [Celeb-DF-v2]
test_dataset: [Celeb-DF-v2]

compression: c23
train_batchSize: 2
test_batchSize: 2
workers: 0
frame_num: {'train': 4, 'test': 4}
resolution: 256
with_mask: false
with_landmark: false
save_ckpt: false
save_feat: false

# data augmentation
use_data_augmentation: true
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.0
  rotate_limit: [-10, 10]
  blur_prob: 0.3
  blur_limit: [3, 5]
  brightness_prob: 0.3
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

# mean and std for normalization
mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]

# optimizer config
optimizer:
  type: adam
  adam:
    lr: 0.0002
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false
  sgd:
    lr: 0.0002
    momentum: 0.9
    weight_decay: 0.0005

# training config
lr_scheduler: null
nEpochs: 2
start_epoch: 0
save_epoch: 1
rec_iter: 1
logdir: ./logs
manualSeed: 1024
save_ckpt: false
save_feat: false

# loss function
loss_func: cross_entropy
losstype: null

# metric
metric_scoring: auc

# cuda
cuda: false
cudnn: true
